name: Discord Commit Notifier

on:
  push:
    branches: [ main ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord webhook
        run: |
          curl -H "Content-Type: application/json" -X POST \
            -d "'{content: "📌 **\($actor)** pushed to **\($repo)**:\nCOMMIT MESSAGE:\n```\($message)```\nhttps://github.com/\($repo)/commit/\($sha)"}')" \
            ${{ secrets.DISCORD_WEBHOOK }} \ $(jq -n \
              --arg actor "$GITHUB_ACTOR" \
              --arg repo "$GITHUB_REPOSITORY" \
              --arg sha "$GITHUB_SHA" \
              --arg message "${{ github.event.head_commit.message }}" 
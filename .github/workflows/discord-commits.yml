name: Discord Commit Notifier

on:
  push:
    branches: [ main ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Get all commits in this push
      - name: Get commits
        id: commits
        run: |
          # Get all commit messages in the push
          COMMITS=$(git log ${{ github.event.before }}..${{ github.sha }} --pretty=format:"• %h: %s by %an")
          
          # Handle empty push (e.g., force push with no new commits)
          if [ -z "$COMMITS" ]; then
            COMMITS="No new commits in this push."
          fi

          echo "COMMITS=$COMMITS" >> $GITHUB_ENV

      # 3️⃣ Send Discord message with all commit messages
      - name: Send Discord message
        run: |
          CHANNEL_ID="1486579386239942676"

          curl -s -X POST "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" \
            -H "Authorization: Bot ${{ secrets.DISCORD_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"📌 **${GITHUB_ACTOR}** pushed to **${GITHUB_REPOSITORY}**:\n${COMMITS}\"
            }"
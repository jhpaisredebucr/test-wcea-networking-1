name: Discord Commit Notifier

on:
  push:
    branches: [ main ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Get last 5 commits (summary)
      - name: Get last 5 commits summary
        id: summary
        run: |
          COMMITS=$(git log -n 5 --pretty=format:"• %h: %s by %an")
          echo "COMMITS=$COMMITS" >> $GITHUB_ENV

      # 3️⃣ Get last 5 commits (detailed)
      - name: Get last 5 commits detailed
        id: detailed
        run: |
          COMMITS_DETAILED=$(git log -n 5 --pretty=format:"• %h: %s by %an <%ae> on %ad")
          echo "COMMITS_DETAILED=$COMMITS_DETAILED" >> $GITHUB_ENV

      # 4️⃣ Send Discord message with both embeds
      - name: Send Discord message
        run: |
          CHANNEL_ID="1486579386239942676"

          curl -s -X POST "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" \
            -H "Authorization: Bot ${{ secrets.DISCORD_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"📌 **${GITHUB_ACTOR}** pushed to **${GITHUB_REPOSITORY}**\",
              \"embeds\": [
                {
                  \"title\": \"Last 5 commits summary\",
                  \"description\": \"${COMMITS}\",
                  \"color\": 5814783
                },
                {
                  \"title\": \"Detailed View (previous 5 commits)\",
                  \"description\": \"${COMMITS_DETAILED}\",
                  \"color\": 16753920
                }
              ]
            }"
name: Discord Commit Notifier

on:
  push:
    branches: [ main ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Get commits in this push
        id: commits
        run: |
          # If this is the first commit, use HEAD only
          if [ "${GITHUB_EVENT_BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            COMMITS=$(git log -n 5 --pretty=format:"• %h: %s by %an")
          else
            COMMITS=$(git log $GITHUB_EVENT_BEFORE..$GITHUB_SHA --pretty=format:"• %h: %s by %an")
          fi

          # Handle empty result
          if [ -z "$COMMITS" ]; then
            COMMITS="No new commits in this push."
          fi

          # Escape for JSON
          ESCAPED_COMMITS=$(echo "$COMMITS" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')

          echo "COMMITS_ESCAPED=$ESCAPED_COMMITS" >> $GITHUB_ENV

      - name: Send Discord message
        run: |
          CHANNEL_ID="1486579386239942676"

          curl -s -X POST "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" \
            -H "Authorization: Bot ${{ secrets.DISCORD_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"📌 **${GITHUB_ACTOR}** pushed to **${GITHUB_REPOSITORY}**:\n${COMMITS_ESCAPED}\"
            }"
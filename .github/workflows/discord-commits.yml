name: Discord Commit Notifier

on:
  push:
    branches: [ main ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Get last 5 commits (detailed)
        id: commits
        run: |
          # Each commit: hash, subject, author, email, date
          COMMITS=$(git log -n 5 --pretty=format:"• **%h**: %s by %an <%ae> on %ad")
          echo "COMMITS=$COMMITS" >> $GITHUB_ENV

      - name: Send Discord embed
        run: |
          CHANNEL_ID="1486579386239942676"

          curl -s -X POST "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" \
            -H "Authorization: Bot ${{ secrets.DISCORD_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [
                {
                  \"title\": \"📌 ${GITHUB_ACTOR} pushed to ${GITHUB_REPOSITORY}\",
                  \"description\": \"${COMMITS}\",
                  \"color\": 5814783
                }
              ]
            }"
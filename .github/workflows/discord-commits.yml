name: Discord Commit Notifier

on:
  push:
    branches: [ main ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord webhook
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"📌 **${GITHUB_ACTOR}** pushed to **${GITHUB_REPOSITORY}**:\nCOMMIT MESSAGE:\n\`\`\`${{ github.event.head_commit.message }}\`\`\`\nhttps://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}\"}" \
               "${{ secrets.DISCORD_WEBHOOK }}"